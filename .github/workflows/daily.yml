# 跨境热点日报：每天 UTC 0:30 运行（北京时间约 8:30）
# 也可在 Actions 页手动点「Run workflow」
#
# 在线看板：请在仓库 Settings → Pages → Branch 选 gh-pages / (root)
# 地址：https://zhoux9179-dotcom.github.io/17TRACK/

name: 跨境热点日报

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 常见失败原因：未在 Settings → Secrets → Actions 里配置 DEEPSEEK_API_KEY
      - name: Check DeepSeek API key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            echo "::error::未配置 Secret「DEEPSEEK_API_KEY」。请到仓库 Settings → Secrets and variables → Actions → New repository secret 添加。"
            exit 1
          fi
          echo "DEEPSEEK_API_KEY 已配置（长度 ${#DEEPSEEK_API_KEY}）"

      - name: Run tracker and send email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          PYTHONUTF8: "1"
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: python 主程序.py --no-open --email

      - name: Prepare GitHub Pages (index.html)
        run: |
          mkdir -p _site
          LATEST=$(ls -t 输出/热点日报_*.html 2>/dev/null | head -n1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" _site/index.html
            echo "Using $LATEST"
          else
            echo '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>跨境热点日报</title></head><body><p>暂无日报，请等待定时任务或手动运行 Actions。</p></body></html>' > _site/index.html
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
